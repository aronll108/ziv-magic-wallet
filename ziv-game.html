<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>餵比卡超食閃電！⚡</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Noto+Sans+HK:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#fff8ee;font-family:'Noto Sans HK',sans-serif;min-height:100dvh;overflow:hidden;touch-action:none;user-select:none}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(circle at 20% 20%,rgba(249,199,79,0.18) 0%,transparent 50%),radial-gradient(circle at 80% 80%,rgba(248,150,30,0.12) 0%,transparent 50%),url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='20' cy='20' r='1.5' fill='%23f9c74f' opacity='0.2'/%3E%3C/svg%3E");pointer-events:none;z-index:0}
.screen{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center}
.screen.hidden{display:none}
#start-screen{background:rgba(255,248,238,0.97)}
.start-emoji{font-size:80px;animation:float 2s ease-in-out infinite;margin-bottom:.5rem}
.start-title{font-family:'Fredoka One',cursive;font-size:30px;color:#3a2a10;margin-bottom:8px}
.start-sub{font-size:14px;color:#8a7060;margin-bottom:2rem;line-height:1.8}
.btn-start{font-family:'Fredoka One',cursive;font-size:20px;background:linear-gradient(135deg,#f9c74f,#f8961e);color:white;border:none;border-radius:50px;padding:14px 44px;cursor:pointer;box-shadow:0 4px 20px rgba(248,150,30,0.35);transition:transform .12s}
.btn-start:active{transform:scale(.95)}
#game-screen{position:fixed;inset:0;z-index:5;display:flex;flex-direction:column}
#game-screen.hidden{display:none}
.hud{position:relative;z-index:20;display:flex;align-items:center;justify-content:space-between;padding:12px 16px 8px;background:rgba(255,248,238,0.92);border-bottom:1px solid rgba(249,199,79,0.3)}
.hud-label{font-size:11px;color:#8a7060}
.hud-val{font-family:'Fredoka One',cursive;font-size:26px;color:#3a2a10;line-height:1}
.hud-lightning{display:flex;gap:4px;flex-wrap:wrap;max-width:180px;justify-content:flex-end}
.bolt-pip{font-size:16px;transition:transform .2s}
.bolt-pip.caught{filter:grayscale(1);opacity:.3;transform:scale(.8)}
.canvas-wrap{position:relative;flex:1;overflow:hidden}
#game-canvas{position:absolute;inset:0;width:100%;height:100%}
.catcher-wrap{position:relative;z-index:20;padding:8px 16px 20px;background:rgba(255,248,238,0.92);border-top:1px solid rgba(249,199,79,0.3);display:flex;align-items:center;justify-content:center;gap:12px}
.catcher-hint{font-size:11px;color:#8a7060;text-align:center}
#pika-catcher{width:70px;height:70px;cursor:pointer;transition:transform .1s;user-select:none;-webkit-tap-highlight-color:transparent;touch-action:none}
#pika-catcher.nom{animation:nomnom .3s ease}
#win-screen{background:rgba(255,248,238,0.97)}
#done-screen{background:rgba(255,248,238,0.97)}
.win-title{font-family:'Fredoka One',cursive;font-size:30px;color:#3a2a10;margin-bottom:6px}
.win-sub{font-size:13px;color:#8a7060;margin-bottom:1.5rem}
.done-title{font-family:'Fredoka One',cursive;font-size:28px;color:#3a2a10;margin-bottom:8px}
.done-sub{font-size:13px;color:#8a7060;margin-bottom:2rem;line-height:1.7}
.ticket-reveal{margin:0 auto 1.5rem;width:280px;animation:popIn .5s cubic-bezier(.175,.885,.32,1.275) both}
.ticket-reveal svg{display:block;border-radius:16px;width:100%}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.btn-gold{font-family:'Fredoka One',cursive;font-size:16px;background:linear-gradient(135deg,#f9c74f,#f8961e);color:white;border:none;border-radius:50px;padding:10px 24px;cursor:pointer;box-shadow:0 3px 12px rgba(248,150,30,0.3);transition:transform .12s}
.btn-gold:active{transform:scale(.95)}
.btn-outline{font-family:'Fredoka One',cursive;font-size:16px;background:none;border:2px solid #e6a800;color:#b87d00;border-radius:50px;padding:10px 24px;cursor:pointer;transition:transform .12s}
.btn-outline:active{transform:scale(.95)}
.spark{position:fixed;font-size:18px;pointer-events:none;z-index:999;animation:sparkFly .7s ease-out forwards}
@keyframes float{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-12px) rotate(3deg)}}
@keyframes nomnom{0%,100%{transform:scale(1)}50%{transform:scale(1.2) rotate(-5deg)}}
@keyframes popIn{from{transform:scale(.8);opacity:0}70%{transform:scale(1.05)}to{transform:scale(1);opacity:1}}
@keyframes sparkFly{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(var(--dx),var(--dy)) scale(.3);opacity:0}}
</style>
</head>
<body>
<div class="screen" id="start-screen">
  <div class="start-emoji">⚡</div>
  <div class="start-title">餵比卡超食閃電！</div>
  <div class="start-sub">閃電從天上跌下來<br>接住 10 粒閃電就解鎖<br>一張神秘禮物券！🎁</div>
  <button class="btn-start" onclick="startGame()">開始玩！⚡</button>
</div>
<div id="game-screen" class="hidden">
  <div class="hud">
    <div><div class="hud-label">接住咗</div><div class="hud-val"><span id="score">0</span> / 10</div></div>
    <div class="hud-lightning" id="bolt-pips"></div>
  </div>
  <div class="canvas-wrap" id="canvas-wrap"><canvas id="game-canvas"></canvas></div>
  <div class="catcher-wrap">
    <div>
      <svg id="pika-catcher" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="50" cy="62" rx="28" ry="26" fill="#f9c74f"/>
        <path d="M28 38 L18 10 L38 32 Z" fill="#f9c74f"/><path d="M29 37 L21 14 L36 32 Z" fill="#2a2a2a" opacity=".8"/>
        <path d="M72 38 L82 10 L62 32 Z" fill="#f9c74f"/><path d="M71 37 L79 14 L64 32 Z" fill="#2a2a2a" opacity=".8"/>
        <circle cx="38" cy="56" r="5" fill="#2a2a2a"/><circle cx="62" cy="56" r="5" fill="#2a2a2a"/>
        <circle cx="40" cy="54" r="1.5" fill="white"/><circle cx="64" cy="54" r="1.5" fill="white"/>
        <ellipse cx="28" cy="65" rx="9" ry="6" fill="#f4a0a0" opacity=".9"/><ellipse cx="72" cy="65" rx="9" ry="6" fill="#f4a0a0" opacity=".9"/>
        <path d="M43 70 Q50 76 57 70" stroke="#2a2a2a" stroke-width="2" fill="none" stroke-linecap="round"/>
        <path d="M22 55 Q10 45 14 35" stroke="#f9c74f" stroke-width="8" fill="none" stroke-linecap="round"/>
        <path d="M78 55 Q90 45 86 35" stroke="#f9c74f" stroke-width="8" fill="none" stroke-linecap="round"/>
        <circle cx="14" cy="33" r="6" fill="#f9c74f"/><circle cx="86" cy="33" r="6" fill="#f9c74f"/>
        <path d="M74 75 L88 60 L80 55 L92 42" stroke="#f9c74f" stroke-width="7" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <div class="catcher-hint">左右移動比卡超接閃電！</div>
    </div>
  </div>
</div>
<div class="screen hidden" id="win-screen">
  <div style="font-size:48px;margin-bottom:8px;">🎉</div>
  <div class="win-title">叻仔！接晒喇！</div>
  <div class="win-sub">比卡超好飽！解鎖咗一張禮物券！</div>
  <div class="ticket-reveal" id="ticket-reveal"></div>
  <div class="btn-row">
    <button class="btn-outline" onclick="goWallet()">睇晒所有券 💰</button>
    <button class="btn-gold" onclick="playAgain()">再玩一次！⚡</button>
  </div>
</div>
<div class="screen hidden" id="done-screen">
  <div style="font-size:56px;margin-bottom:12px;">🏆</div>
  <div class="done-title">所有券都解鎖喇！</div>
  <div class="done-sub">你真係電力十足！⚡<br>契爺謙好愛你！</div>
  <button class="btn-gold" onclick="goWallet()">睇晒 10 張券 💰</button>
</div>
<script>
const TICKETS=[
  {num:'01',bg:'#fffbea',border:'#e6ac00',titleC:'#8a6400',amtC:'#b87d00',icon:'🎂',label:'生日快樂'},
  {num:'02',bg:'#f3eeff',border:'#9b7de8',titleC:'#5a3fa8',amtC:'#7a5cc8',icon:'⭐',label:'健康成長'},
  {num:'03',bg:'#fff0f5',border:'#f48fb1',titleC:'#c2185b',amtC:'#e91e63',icon:'🌸',label:'開心快樂'},
  {num:'04',bg:'#fff4e6',border:'#ffa040',titleC:'#b35c00',amtC:'#e07000',icon:'👑',label:'小小王子'},
  {num:'05',bg:'#efffef',border:'#5abf5a',titleC:'#2d6e2d',amtC:'#388e3c',icon:'⚽',label:'勁力無限'},
  {num:'06',bg:'#eafbfb',border:'#3abfbf',titleC:'#007a7a',amtC:'#009999',icon:'🏆',label:'勝利之星'},
  {num:'07',bg:'#eaf4ff',border:'#5599e8',titleC:'#1a4da8',amtC:'#2060c8',icon:'✈️',label:'天空無限'},
  {num:'08',bg:'#edfaf5',border:'#2db88a',titleC:'#0d6e4e',amtC:'#188a60',icon:'🏁',label:'衝線一刻'},
  {num:'09',bg:'#fff0ee',border:'#f47060',titleC:'#b52a1a',amtC:'#d93820',icon:'⚡',label:'電力十足'},
  {num:'10',bg:'#f5f5f5',border:'#999999',titleC:'#444444',amtC:'#555555',icon:'🎁',label:'神秘禮物'},
];
const canvas=document.getElementById('game-canvas');const ctx=canvas.getContext('2d');
let score=0,bolts=[],pikaX=0,animId=null,lastSpawn=0,spawnInterval=1800,gameRunning=false,dragging=false,dragStartX=0,pikaStartX=0;
let unlockedCount=parseInt(localStorage.getItem('ziv-unlocked')||'0');
function resizeCanvas(){const wrap=document.getElementById('canvas-wrap');canvas.width=wrap.clientWidth;canvas.height=wrap.clientHeight;pikaX=canvas.width/2;}
function startGame(){
  document.getElementById('start-screen').classList.add('hidden');document.getElementById('game-screen').classList.remove('hidden');
  resizeCanvas();score=0;bolts=[];lastSpawn=0;spawnInterval=1800;gameRunning=true;
  updateHUD();buildPips();loop(0);setupControls();
}
function loop(ts){
  if(!gameRunning)return;ctx.clearRect(0,0,canvas.width,canvas.height);
  if(ts-lastSpawn>spawnInterval){spawnBolt();lastSpawn=ts;spawnInterval=Math.max(800,spawnInterval-30);}
  const pikaTop=canvas.height-20;
  bolts=bolts.filter(b=>{b.y+=b.speed;const dx=Math.abs(b.x-pikaX),caught=dx<60&&b.y>pikaTop-70&&b.y<pikaTop+20;
    if(caught){catchBolt(b);return false;}if(b.y>canvas.height+40)return false;drawBolt(b);return true;});
  drawPika();animId=requestAnimationFrame(loop);
}
function spawnBolt(){const m=40;bolts.push({x:m+Math.random()*(canvas.width-m*2),y:-30,speed:3.5+Math.random()*2.5,size:28+Math.random()*14,rot:(Math.random()-.5)*.5});}
function drawBolt(b){ctx.save();ctx.translate(b.x,b.y);ctx.rotate(b.rot);ctx.font=b.size+'px serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('⚡',0,0);ctx.restore();}
function drawPika(){const pika=document.getElementById('pika-catcher');const wrap=document.getElementById('canvas-wrap');pika.style.transform=`translateX(${pikaX-wrap.clientWidth/2}px)`;}
function catchBolt(){score++;updateHUD();nomAnim();spawnSparks(pikaX+canvas.getBoundingClientRect().left,window.innerHeight-120);if(score>=10){setTimeout(showWin,300);}}
function setupControls(){
  const wrap=document.getElementById('canvas-wrap');const pika=document.getElementById('pika-catcher');
  [wrap,pika].forEach(el=>{
    el.addEventListener('touchstart',e=>{dragging=true;dragStartX=e.touches[0].clientX;pikaStartX=pikaX;},{passive:true});
    el.addEventListener('touchmove',e=>{if(!dragging)return;const dx=e.touches[0].clientX-dragStartX;pikaX=Math.max(40,Math.min(canvas.width-40,pikaStartX+dx));},{passive:true});
    el.addEventListener('touchend',()=>{dragging=false;});
    el.addEventListener('mousedown',e=>{dragging=true;dragStartX=e.clientX;pikaStartX=pikaX;});
    el.addEventListener('mousemove',e=>{if(!dragging)return;const dx=e.clientX-dragStartX;pikaX=Math.max(40,Math.min(canvas.width-40,pikaStartX+dx));});
    el.addEventListener('mouseup',()=>{dragging=false;});
  });
}
function nomAnim(){const p=document.getElementById('pika-catcher');p.classList.remove('nom');void p.offsetWidth;p.classList.add('nom');}
function buildPips(){const pips=document.getElementById('bolt-pips');pips.innerHTML='';for(let i=0;i<10;i++){const s=document.createElement('span');s.className='bolt-pip';s.textContent='⚡';pips.appendChild(s);}}
function updateHUD(){document.getElementById('score').textContent=score;const pips=document.querySelectorAll('.bolt-pip');pips.forEach((p,i)=>{p.classList.toggle('caught',i<score);});}
function showWin(){
  gameRunning=false;cancelAnimationFrame(animId);
  unlockedCount++;if(unlockedCount>10)unlockedCount=10;localStorage.setItem('ziv-unlocked',unlockedCount);
  document.getElementById('game-screen').classList.add('hidden');
  if(unlockedCount>10){document.getElementById('done-screen').classList.remove('hidden');return;}
  const t=TICKETS[unlockedCount-1];document.getElementById('ticket-reveal').innerHTML=makeSVG(t,unlockedCount);document.getElementById('win-screen').classList.remove('hidden');
  for(let i=0;i<3;i++)setTimeout(()=>spawnSparks(window.innerWidth/2,window.innerHeight/3),i*200);
}
function spawnSparks(cx,cy){
  ['⭐','✨','💛','⚡','🌟','🎉'].forEach((e,j)=>{const span=document.createElement('span');span.className='spark';const angle=(j/6)*2*Math.PI+Math.random()*.4,dist=55+Math.random()*30;span.style.setProperty('--dx',Math.cos(angle)*dist+'px');span.style.setProperty('--dy',Math.sin(angle)*dist-20+'px');span.style.left=(cx-10)+'px';span.style.top=(cy-10)+'px';span.style.animationDelay=(j*.05)+'s';span.textContent=e;document.body.appendChild(span);setTimeout(()=>span.remove(),900);});
}
function makeSVG(t,idx){
  const{bg,border:br,titleC:tc,amtC:ac,icon,label,num}=t;
  return`<svg viewBox="0 0 280 160" xmlns="http://www.w3.org/2000/svg"><defs><pattern id="wdp${idx}" patternUnits="userSpaceOnUse" width="14" height="14"><circle cx="7" cy="7" r="1.3" fill="${br}" opacity="0.15"/></pattern><clipPath id="wcp${idx}"><rect width="280" height="160" rx="20"/></clipPath></defs><rect width="280" height="160" rx="20" fill="${bg}"/><rect width="280" height="160" fill="url(#wdp${idx})" clip-path="url(#wcp${idx})"/><rect x="2" y="2" width="276" height="156" rx="18" fill="none" stroke="${br}" stroke-width="2.5"/><rect x="8" y="8" width="264" height="144" rx="13" fill="none" stroke="${br}" stroke-width=".8" opacity=".45"/><circle cx="0" cy="80" r="12" fill="#fff8ee"/><circle cx="280" cy="80" r="12" fill="#fff8ee"/><line x1="20" y1="80" x2="260" y2="80" stroke="${br}" stroke-width="1" stroke-dasharray="5,4" opacity=".4"/><text x="22" y="42" font-family="serif" font-size="26">${icon}</text><text x="54" y="42" font-family="'Noto Sans HK',sans-serif" font-size="15" font-weight="700" fill="${tc}" letter-spacing="1">${label}</text><text x="258" y="42" font-family="'Noto Sans HK',sans-serif" font-size="12" fill="${tc}" text-anchor="end" opacity=".65">No.${num}</text><ellipse cx="38" cy="110" rx="16" ry="18" fill="white" stroke="${br}" stroke-width="1"/><ellipse cx="30" cy="93" rx="7" ry="10" fill="white" stroke="${br}" stroke-width=".9"/><ellipse cx="46" cy="93" rx="7" ry="10" fill="white" stroke="${br}" stroke-width=".9"/><circle cx="33" cy="107" r="2.5" fill="#2a2a2a"/><circle cx="43" cy="107" r="2.5" fill="#2a2a2a"/><ellipse cx="38" cy="113" rx="4" ry="2" fill="#ffb3c1"/><path d="M33 117 Q38 122 43 117" stroke="#2a2a2a" stroke-width="1.2" fill="none" stroke-linecap="round"/><text x="140" y="116" font-family="'Fredoka One',cursive" font-size="38" font-weight="700" fill="${ac}" text-anchor="middle">$88</text><ellipse cx="242" cy="112" rx="18" ry="18" fill="#f9c74f" stroke="${br}" stroke-width="1"/><path d="M228 100 L222 82 L236 96 Z" fill="#f9c74f" stroke="${br}" stroke-width=".9"/><path d="M256 100 L262 82 L248 96 Z" fill="#f9c74f" stroke="${br}" stroke-width=".9"/><path d="M229 99 L224 84 L235 96 Z" fill="#2a2a2a" opacity=".75"/><path d="M255 99 L260 84 L249 96 Z" fill="#2a2a2a" opacity=".75"/><circle cx="236" cy="109" r="2.5" fill="#2a2a2a"/><circle cx="248" cy="109" r="2.5" fill="#2a2a2a"/><ellipse cx="228" cy="115" rx="6" ry="3.5" fill="#f4a0a0" opacity=".9"/><ellipse cx="256" cy="115" rx="6" ry="3.5" fill="#f4a0a0" opacity=".9"/><path d="M238 118 Q242 123 246 118" stroke="#2a2a2a" stroke-width="1.2" fill="none" stroke-linecap="round"/><text x="140" y="147" font-family="'Noto Sans HK',sans-serif" font-size="11" fill="${tc}" text-anchor="middle" opacity=".6">From 契爺謙 ♥ 2026.04.24</text></svg>`;
}
function playAgain(){document.getElementById('win-screen').classList.add('hidden');startGame();}
function goWallet(){window.location.href='index.html';}
window.addEventListener('resize',()=>{if(gameRunning)resizeCanvas();});
</script>
</body>
</html>
