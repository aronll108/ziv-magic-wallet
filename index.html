<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ziv 嘅魔法小金庫 💰</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Noto+Sans+HK:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --gold: #f9c74f; --gold-d: #e6a800; --bg: #fff8ee;
  --text: #3a2a10; --sub: #8a7060;
}
body {
  background: var(--bg); font-family: 'Noto Sans HK', sans-serif;
  min-height: 100dvh; overflow-x: hidden;
}
body::before {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background:
    radial-gradient(circle at 20% 20%, rgba(249,199,79,0.18) 0%, transparent 50%),
    radial-gradient(circle at 80% 80%, rgba(248,150,30,0.12) 0%, transparent 50%),
    url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='20' cy='20' r='1.5' fill='%23f9c74f' opacity='0.2'/%3E%3C/svg%3E");
}
.wrap { position: relative; z-index: 1; max-width: 420px; margin: 0 auto; padding: 0 0 2.5rem; }

/* Header */
.header { text-align: center; padding: 1.5rem 1rem 0.75rem; }
.header-badge {
  display: inline-block; background: linear-gradient(135deg, #f9c74f, #f8961e);
  color: #fff; font-family: 'Fredoka One', cursive; font-size: 11px;
  letter-spacing: 2px; text-transform: uppercase; padding: 4px 14px;
  border-radius: 20px; margin-bottom: 10px;
}
.header h1 { font-family: 'Fredoka One', cursive; font-size: 26px; color: var(--text); margin-bottom: 3px; }
.header p { font-size: 12px; color: var(--sub); }

/* Counter */
.counter-card {
  margin: 0.75rem 1rem; background: #fff; border-radius: 20px;
  padding: 1rem 1.25rem; box-shadow: 0 4px 20px rgba(180,120,20,0.12);
  border: 1px solid rgba(249,199,79,0.3);
  display: flex; align-items: center; justify-content: space-between;
}
.counter-main .lbl { font-size: 11px; color: var(--sub); margin-bottom: 2px; }
.counter-main .num { font-family: 'Fredoka One', cursive; font-size: 44px; color: var(--text); line-height: 1; }
.counter-main .sub2 { font-size: 12px; color: var(--sub); }
.counter-right { text-align: right; }
.counter-right .lbl { font-size: 11px; color: var(--sub); margin-bottom: 2px; }
.counter-right .used { font-family: 'Fredoka One', cursive; font-size: 26px; color: #ccc; }

/* Progress */
.prog-wrap { margin: 0 1rem 0.75rem; height: 7px; background: rgba(0,0,0,0.06); border-radius: 8px; overflow: hidden; }
.prog-bar { height: 100%; background: linear-gradient(90deg,#f9c74f,#f8961e); border-radius: 8px; transition: width 0.5s ease; }

/* Games nav */
.games-nav {
  margin: 0 1rem 0.75rem; display: flex; gap: 8px;
}
.game-btn {
  flex: 1; font-family: 'Fredoka One', cursive; font-size: 13px;
  background: #fff; border: 1.5px solid rgba(249,199,79,0.5); color: var(--text);
  border-radius: 14px; padding: 10px 6px; cursor: pointer; text-align: center;
  text-decoration: none; display: flex; flex-direction: column; align-items: center; gap: 3px;
  transition: transform 0.12s, box-shadow 0.12s;
  box-shadow: 0 2px 8px rgba(180,120,20,0.08);
}
.game-btn:active { transform: scale(0.94); }
.game-btn .icon { font-size: 22px; }
.game-btn .name { font-size: 11px; color: var(--sub); }

/* Hint */
.hint { text-align: center; font-size: 12px; color: var(--sub); padding: 0.25rem 1rem 0.5rem; }

/* Locked state */
.locked-msg {
  margin: 0 1rem; text-align: center; padding: 2rem 1.5rem;
  background: #fff; border-radius: 20px; border: 1.5px dashed rgba(249,199,79,0.5);
  box-shadow: 0 2px 12px rgba(180,120,20,0.07);
}
.locked-msg .lock-icon { font-size: 44px; margin-bottom: 10px; }
.locked-msg h3 { font-family: 'Fredoka One', cursive; font-size: 18px; color: var(--text); margin-bottom: 6px; }
.locked-msg p { font-size: 12px; color: var(--sub); line-height: 1.7; }

/* Tickets grid */
.tickets-grid {
  display: flex; flex-wrap: wrap; gap: 10px;
  justify-content: center; padding: 0.25rem 0.75rem;
}
.ticket {
  cursor: pointer; border-radius: 14px; position: relative;
  overflow: hidden; transition: transform 0.15s, box-shadow 0.15s;
  -webkit-tap-highlight-color: transparent;
  width: 155px; height: 90px; flex-shrink: 0;
}
.ticket:active { transform: scale(0.94); }
.ticket:hover  { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.1); }
.ticket svg { display: block; }

/* Used overlay */
.ticket.used::after {
  content: '✓ 已用'; position: absolute; inset: 0;
  background: rgba(0,0,0,0.45); color: #fff;
  font-family: 'Fredoka One', cursive; font-size: 18px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 14px; letter-spacing: 1px;
}

/* All done */
.all-done {
  text-align: center; padding: 1.5rem 1rem;
  display: none;
}
.all-done h2 { font-family: 'Fredoka One', cursive; font-size: 22px; color: var(--text); margin-bottom: 6px; }
.all-done p { font-size: 12px; color: var(--sub); }

/* Mark used */
.mark-btn {
  display: block; margin: 0.5rem auto 0;
  font-family: 'Fredoka One', cursive; font-size: 11px;
  color: var(--sub); background: none;
  border: 1px solid rgba(0,0,0,0.12); border-radius: 8px;
  padding: 5px 14px; cursor: pointer;
}

/* Reset (hidden by default) */
.reset-wrap { text-align: center; padding: 1rem 1rem 0; border-top: 1px solid rgba(0,0,0,0.06); margin-top: 0.75rem; }
.reset-btn {
  font-size: 11px; color: #ccc; background: none;
  border: 1px solid #e0e0e0; border-radius: 8px; padding: 5px 14px;
  cursor: pointer; font-family: 'Noto Sans HK', sans-serif;
}
.reset-btn:hover { color: #999; border-color: #bbb; }

/* Modal */
.modal-overlay {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  padding: 1.5rem;
  opacity: 0; pointer-events: none; transition: opacity 0.25s;
}
.modal-overlay.show { opacity: 1; pointer-events: all; }
.modal-card {
  background: #fff8ee; border-radius: 24px; padding: 1.5rem 1.25rem;
  width: 100%; max-width: 340px; text-align: center;
  transform: scale(0.85); transition: transform 0.25s;
  box-shadow: 0 8px 40px rgba(0,0,0,0.2);
}
.modal-overlay.show .modal-card { transform: scale(1); }
.modal-ticket { width: 100%; margin: 0 auto 1rem; }
.modal-ticket svg { display: block; border-radius: 16px; width: 100%; }
.modal-title { font-family: 'Fredoka One', cursive; font-size: 18px; color: var(--text); margin-bottom: 4px; }
.modal-sub { font-size: 12px; color: var(--sub); margin-bottom: 1rem; }
.modal-btns { display: flex; gap: 8px; }
.modal-use {
  flex: 1; font-family: 'Fredoka One', cursive; font-size: 15px;
  background: linear-gradient(135deg,#f9c74f,#f8961e); color: #fff;
  border: none; border-radius: 50px; padding: 10px; cursor: pointer;
}
.modal-close {
  flex: 1; font-family: 'Fredoka One', cursive; font-size: 15px;
  background: none; border: 1.5px solid var(--gold-d); color: var(--gold-d);
  border-radius: 50px; padding: 10px; cursor: pointer;
}

@keyframes popIn { from { transform: scale(0.7); opacity:0; } to { transform: scale(1); opacity:1; } }
.ticket { animation: popIn 0.3s ease both; }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="header-badge">4th Birthday Limited Edition</div>
    <h1>💰 Ziv 嘅魔法小金庫</h1>
    <p>Happy 4th Birthday！祝你快高長大、電力十足！</p>
  </div>

  <div class="counter-card">
    <div class="counter-main">
      <div class="lbl">解鎖咗</div>
      <div class="num" id="unlocked-num">0</div>
      <div class="sub2">/ 10 張</div>
    </div>
    <div class="counter-right">
      <div class="lbl">已用</div>
      <div class="used" id="used-num">0</div>
    </div>
  </div>

  <div class="prog-wrap">
    <div class="prog-bar" id="prog-bar" style="width:0%"></div>
  </div>

  <!-- Game shortcuts -->
  <div class="games-nav">
    <a class="game-btn" href="ziv-balloon.html">
      <span class="icon">🎈</span>
      <span class="name">打氣球</span>
    </a>
    <a class="game-btn" href="ziv-catch.html">
      <span class="icon">🔴</span>
      <span class="name">捉精靈</span>
    </a>
    <a class="game-btn" href="ziv-game.html">
      <span class="icon">⚡</span>
      <span class="name">接閃電</span>
    </a>
  </div>

  <div class="hint" id="hint-text">玩遊戲解鎖禮物券！👆</div>

  <!-- Locked state -->
  <div class="locked-msg" id="locked-msg">
    <div class="lock-icon">🔒</div>
    <h3>未解鎖任何券</h3>
    <p>撳上面嘅遊戲按鈕<br>玩完就解鎖禮物券！🎁</p>
  </div>

  <!-- Tickets -->
  <div class="tickets-grid" id="tickets-grid" style="display:none;"></div>

  <div class="all-done" id="all-done">
    <div style="font-size:40px;margin-bottom:8px;">🏆</div>
    <h2>10 張全部解鎖喇！</h2>
    <p>開心買，開心玩！⚡</p>
  </div>

  <div class="reset-wrap">
    <button class="reset-btn" onclick="confirmReset()">↺ 重置（契爺專用）</button>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal-card">
    <div class="modal-ticket" id="modal-ticket"></div>
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-sub" id="modal-sub"></div>
    <div class="modal-btns">
      <button class="modal-use" id="modal-use-btn" onclick="markUsed()">✓ 用咗呢張</button>
      <button class="modal-close" onclick="closeModal()">返回</button>
    </div>
  </div>
</div>

<script>
const TICKETS = [
  {num:'01',bg:'#fffbea',border:'#e6ac00',titleC:'#8a6400',amtC:'#b87d00',icon:'🎂',label:'生日快樂'},
  {num:'02',bg:'#f3eeff',border:'#9b7de8',titleC:'#5a3fa8',amtC:'#7a5cc8',icon:'⭐',label:'健康成長'},
  {num:'03',bg:'#fff0f5',border:'#f48fb1',titleC:'#c2185b',amtC:'#e91e63',icon:'🌸',label:'開心快樂'},
  {num:'04',bg:'#fff4e6',border:'#ffa040',titleC:'#b35c00',amtC:'#e07000',icon:'👑',label:'小小王子'},
  {num:'05',bg:'#efffef',border:'#5abf5a',titleC:'#2d6e2d',amtC:'#388e3c',icon:'⚽',label:'勁力無限'},
  {num:'06',bg:'#eafbfb',border:'#3abfbf',titleC:'#007a7a',amtC:'#009999',icon:'🏆',label:'勝利之星'},
  {num:'07',bg:'#eaf4ff',border:'#5599e8',titleC:'#1a4da8',amtC:'#2060c8',icon:'✈️',label:'天空無限'},
  {num:'08',bg:'#edfaf5',border:'#2db88a',titleC:'#0d6e4e',amtC:'#188a60',icon:'🏁',label:'衝線一刻'},
  {num:'09',bg:'#fff0ee',border:'#f47060',titleC:'#b52a1a',amtC:'#d93820',icon:'⚡',label:'電力十足'},
  {num:'10',bg:'#f5f5f5',border:'#999999',titleC:'#444444',amtC:'#555555',icon:'🎁',label:'神秘禮物'},
];

let unlockedCount = parseInt(localStorage.getItem('ziv-unlocked') || '0');
let usedArr = JSON.parse(localStorage.getItem('ziv-used') || '[]'); // array of used ticket indices (0-based)
let selectedIdx = -1;

function render() {
  unlockedCount = Math.min(10, parseInt(localStorage.getItem('ziv-unlocked') || '0'));
  usedArr = JSON.parse(localStorage.getItem('ziv-used') || '[]');
  const usedCount = usedArr.length;

  document.getElementById('unlocked-num').textContent = unlockedCount;
  document.getElementById('used-num').textContent = usedCount;
  document.getElementById('prog-bar').style.width = (unlockedCount / 10 * 100) + '%';

  const lockedMsg = document.getElementById('locked-msg');
  const grid = document.getElementById('tickets-grid');
  const allDone = document.getElementById('all-done');
  const hint = document.getElementById('hint-text');

  if (unlockedCount === 0) {
    lockedMsg.style.display = 'block';
    grid.style.display = 'none';
    allDone.style.display = 'none';
    hint.textContent = '玩遊戲解鎖禮物券！👆';
    return;
  }

  lockedMsg.style.display = 'none';
  grid.style.display = 'flex';

  if (unlockedCount >= 10 && usedCount >= 10) {
    allDone.style.display = 'block';
  } else {
    allDone.style.display = 'none';
  }

  const remaining = unlockedCount - usedCount;
  hint.textContent = remaining > 0 ? `撳張券可以用佢！剩 ${remaining} 張未用 🎁` : '所有券都用完喇！🎉';

  grid.innerHTML = '';
  for (let i = 0; i < unlockedCount; i++) {
    const t = TICKETS[i];
    const isUsed = usedArr.includes(i);
    const div = document.createElement('div');
    div.className = 'ticket' + (isUsed ? ' used' : '');
    div.style.animationDelay = (i * 0.05) + 's';
    div.innerHTML = makeTicketSVG(t, i, 155, 90);
    if (!isUsed) div.addEventListener('click', () => openModal(i));
    grid.appendChild(div);
  }
}

function makeTicketSVG(t, idx, w, h) {
  const {bg, border:br, titleC:tc, amtC:ac, icon, label, num} = t;
  const bh = Math.round(h * 1.0);
  return `<svg width="${w}" height="${bh}" viewBox="0 0 ${w} ${bh}" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="dp${idx}w" patternUnits="userSpaceOnUse" width="12" height="12">
      <circle cx="6" cy="6" r="1.1" fill="${br}" opacity="0.15"/>
    </pattern>
    <clipPath id="cp${idx}w"><rect width="${w}" height="${bh}" rx="14"/></clipPath>
  </defs>
  <rect width="${w}" height="${bh}" rx="14" fill="${bg}"/>
  <rect width="${w}" height="${bh}" fill="url(#dp${idx}w)" clip-path="url(#cp${idx}w)"/>
  <rect x="1.5" y="1.5" width="${w-3}" height="${bh-3}" rx="12.5" fill="none" stroke="${br}" stroke-width="1.8"/>
  <rect x="5" y="5" width="${w-10}" height="${bh-10}" rx="9" fill="none" stroke="${br}" stroke-width="0.5" opacity="0.4"/>
  <circle cx="0" cy="${bh/2}" r="7" fill="#fff8ee"/>
  <circle cx="${w}" cy="${bh/2}" r="7" fill="#fff8ee"/>
  <line x1="13" y1="${bh/2}" x2="${w-13}" y2="${bh/2}" stroke="${br}" stroke-width="0.7" stroke-dasharray="3,3" opacity="0.4"/>
  <text x="12" y="22" font-family="serif" font-size="16">${icon}</text>
  <text x="32" y="22" font-family="'Noto Sans HK',sans-serif" font-size="9" font-weight="700" fill="${tc}" letter-spacing="0.5">${label}</text>
  <text x="${w-10}" y="22" font-family="'Noto Sans HK',sans-serif" font-size="8" fill="${tc}" text-anchor="end" opacity="0.6">No.${num}</text>
  <ellipse cx="22" cy="${Math.round(bh*0.68)}" rx="10" ry="11" fill="white" stroke="${br}" stroke-width="0.8"/>
  <ellipse cx="17.5" cy="${Math.round(bh*0.56)}" rx="4.5" ry="6" fill="white" stroke="${br}" stroke-width="0.7"/>
  <ellipse cx="26.5" cy="${Math.round(bh*0.56)}" rx="4.5" ry="6" fill="white" stroke="${br}" stroke-width="0.7"/>
  <circle cx="19" cy="${Math.round(bh*0.65)}" r="1.6" fill="#2a2a2a"/>
  <circle cx="25" cy="${Math.round(bh*0.65)}" r="1.6" fill="#2a2a2a"/>
  <ellipse cx="22" cy="${Math.round(bh*0.71)}" rx="2.8" ry="1.3" fill="#ffb3c1"/>
  <path d="M19 ${Math.round(bh*0.75)} Q22 ${Math.round(bh*0.79)} 25 ${Math.round(bh*0.75)}" stroke="#2a2a2a" stroke-width="0.8" fill="none" stroke-linecap="round"/>
  <text x="${w/2}" y="${Math.round(bh*0.72)}" font-family="'Fredoka One',cursive" font-size="22" font-weight="700" fill="${ac}" text-anchor="middle">$88</text>
  <ellipse cx="${w-22}" cy="${Math.round(bh*0.69)}" rx="11" ry="11" fill="#f9c74f" stroke="${br}" stroke-width="0.8"/>
  <path d="M${w-30} ${Math.round(bh*0.6)} L${w-34} ${Math.round(bh*0.44)} L${w-24} ${Math.round(bh*0.57)} Z" fill="#f9c74f" stroke="${br}" stroke-width="0.7"/>
  <path d="M${w-14} ${Math.round(bh*0.6)} L${w-10} ${Math.round(bh*0.44)} L${w-20} ${Math.round(bh*0.57)} Z" fill="#f9c74f" stroke="${br}" stroke-width="0.7"/>
  <circle cx="${w-26}" cy="${Math.round(bh*0.67)}" r="1.6" fill="#2a2a2a"/>
  <circle cx="${w-18}" cy="${Math.round(bh*0.67)}" r="1.6" fill="#2a2a2a"/>
  <ellipse cx="${w-31}" cy="${Math.round(bh*0.73)}" rx="4" ry="2.2" fill="#f4a0a0" opacity="0.9"/>
  <ellipse cx="${w-13}" cy="${Math.round(bh*0.73)}" rx="4" ry="2.2" fill="#f4a0a0" opacity="0.9"/>
  <path d="M${w-25} ${Math.round(bh*0.76)} Q${w-22} ${Math.round(bh*0.81)} ${w-19} ${Math.round(bh*0.76)}" stroke="#2a2a2a" stroke-width="0.8" fill="none" stroke-linecap="round"/>
  <text x="${w/2}" y="${bh-6}" font-family="'Noto Sans HK',sans-serif" font-size="7.5" fill="${tc}" text-anchor="middle" opacity="0.55">From 契爺謙 ♥ 2026.04.24</text>
</svg>`;
}

function makeLargeTicketSVG(t, idx) {
  const {bg, border:br, titleC:tc, amtC:ac, icon, label, num} = t;
  return `<svg viewBox="0 0 290 165" xmlns="http://www.w3.org/2000/svg">
  <defs><pattern id="mdp${idx}" patternUnits="userSpaceOnUse" width="14" height="14"><circle cx="7" cy="7" r="1.3" fill="${br}" opacity="0.15"/></pattern><clipPath id="mcp${idx}"><rect width="290" height="165" rx="20"/></clipPath></defs>
  <rect width="290" height="165" rx="20" fill="${bg}"/>
  <rect width="290" height="165" fill="url(#mdp${idx})" clip-path="url(#mcp${idx})"/>
  <rect x="2" y="2" width="286" height="161" rx="18" fill="none" stroke="${br}" stroke-width="2.5"/>
  <rect x="7" y="7" width="276" height="151" rx="14" fill="none" stroke="${br}" stroke-width="0.7" opacity="0.4"/>
  <circle cx="0" cy="82" r="13" fill="#fff8ee"/><circle cx="290" cy="82" r="13" fill="#fff8ee"/>
  <line x1="20" y1="82" x2="270" y2="82" stroke="${br}" stroke-width="1" stroke-dasharray="5,4" opacity="0.4"/>
  <text x="22" y="46" font-family="serif" font-size="28">${icon}</text>
  <text x="58" y="46" font-family="'Noto Sans HK',sans-serif" font-size="16" font-weight="700" fill="${tc}" letter-spacing="1">${label}</text>
  <text x="268" y="46" font-family="'Noto Sans HK',sans-serif" font-size="12" fill="${tc}" text-anchor="end" opacity="0.6">No.${num}</text>
  <ellipse cx="40" cy="114" rx="17" ry="19" fill="white" stroke="${br}" stroke-width="1"/>
  <ellipse cx="31" cy="96" rx="7.5" ry="10.5" fill="white" stroke="${br}" stroke-width="0.9"/>
  <ellipse cx="49" cy="96" rx="7.5" ry="10.5" fill="white" stroke="${br}" stroke-width="0.9"/>
  <circle cx="34" cy="110" r="2.8" fill="#2a2a2a"/><circle cx="46" cy="110" r="2.8" fill="#2a2a2a"/>
  <ellipse cx="40" cy="117" rx="4.5" ry="2.2" fill="#ffb3c1"/>
  <path d="M35 121 Q40 126 45 121" stroke="#2a2a2a" stroke-width="1.3" fill="none" stroke-linecap="round"/>
  <text x="145" y="120" font-family="'Fredoka One',cursive" font-size="40" fill="${ac}" text-anchor="middle">$88</text>
  <ellipse cx="250" cy="115" rx="19" ry="19" fill="#f9c74f" stroke="${br}" stroke-width="1"/>
  <path d="M234 103 L228 83 L242 98 Z" fill="#f9c74f" stroke="${br}" stroke-width="0.9"/>
  <path d="M266 103 L272 83 L258 98 Z" fill="#f9c74f" stroke="${br}" stroke-width="0.9"/>
  <path d="M235 102 L230 85 L241 98 Z" fill="#2a2a2a" opacity="0.75"/>
  <path d="M265 102 L270 85 L259 98 Z" fill="#2a2a2a" opacity="0.75"/>
  <circle cx="244" cy="112" r="2.8" fill="#2a2a2a"/><circle cx="256" cy="112" r="2.8" fill="#2a2a2a"/>
  <ellipse cx="236" cy="118" rx="6.5" ry="3.5" fill="#f4a0a0" opacity="0.9"/>
  <ellipse cx="264" cy="118" rx="6.5" ry="3.5" fill="#f4a0a0" opacity="0.9"/>
  <path d="M246 122 Q250 127 254 122" stroke="#2a2a2a" stroke-width="1.3" fill="none" stroke-linecap="round"/>
  <text x="145" y="152" font-family="'Noto Sans HK',sans-serif" font-size="11" fill="${tc}" text-anchor="middle" opacity="0.6">From 契爺謙 ♥ 2026.04.24</text>
</svg>`;
}

function openModal(idx) {
  selectedIdx = idx;
  const t = TICKETS[idx];
  document.getElementById('modal-ticket').innerHTML = makeLargeTicketSVG(t, idx);
  document.getElementById('modal-title').textContent = t.label + ' ' + t.icon;
  document.getElementById('modal-sub').textContent = '撳「用咗呢張」就會標記為已使用';
  document.getElementById('modal').classList.add('show');
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modal')) return;
  document.getElementById('modal').classList.remove('show');
  selectedIdx = -1;
}

function markUsed() {
  if (selectedIdx < 0) return;
  if (!usedArr.includes(selectedIdx)) {
    usedArr.push(selectedIdx);
    localStorage.setItem('ziv-used', JSON.stringify(usedArr));
  }
  document.getElementById('modal').classList.remove('show');
  selectedIdx = -1;
  render();
}

function confirmReset() {
  if (confirm('確定重置所有進度？（契爺用）')) {
    localStorage.removeItem('ziv-unlocked');
    localStorage.removeItem('ziv-used');
    render();
  }
}

render();
// Re-render when coming back from game
window.addEventListener('focus', render);
document.addEventListener('visibilitychange', () => { if (!document.hidden) render(); });
</script>
</body>
</html>
